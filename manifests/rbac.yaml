# Proposals: create and list Proposal CRs cluster-wide.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lightspeed-agentic-alerts-adapter-proposals
rules:
  - apiGroups: ["agentic.openshift.io"]
    resources: ["proposals"]
    verbs: ["create", "list", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lightspeed-agentic-alerts-adapter-proposals
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lightspeed-agentic-alerts-adapter-proposals
subjects:
  - kind: ServiceAccount
    name: lightspeed-agentic-alerts-adapter
    namespace: openshift-lightspeed
---
# AlertManager: read firing alerts from the monitoring stack.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lightspeed-agentic-alerts-adapter-alertmanager
  namespace: openshift-monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: monitoring-alertmanager-view
subjects:
  - kind: ServiceAccount
    name: lightspeed-agentic-alerts-adapter
    namespace: openshift-lightspeed
