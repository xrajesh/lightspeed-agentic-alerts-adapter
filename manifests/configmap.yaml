apiVersion: v1
kind: ConfigMap
metadata:
  name: alerts-adapter-config
  namespace: openshift-lightspeed
data:
  config.yaml: |
    # pollInterval: how often to poll AlertManager for firing alerts.
    # Default: 30s
    pollInterval: 30s

    # initialDelay: how long an alert must be firing before a Proposal is created.
    # Filters out transient alerts that resolve on their own.
    # Default: 5m
    initialDelay: 5m

    # cooldownWindow: after a Proposal reaches a terminal state (Completed, Failed,
    # Denied, Escalated), how long to wait before creating a new Proposal for the
    # same alert fingerprint. Prevents flooding for flapping alerts.
    # Default: 1h
    cooldownWindow: 1h

    # tools: shared skills for all workflow steps (maps to spec.tools on the Proposal).
    # When configured, every Proposal created by the adapter includes these skills.
    # Omit to create Proposals with no tools.
    # tools:
    #   skills:
    #     - image: registry.redhat.io/openshift-lightspeed/agentic-skills:latest
    #       paths:
    #         - /skills/prometheus
    #         - /skills/cluster-diagnostics

    # Per-step tool overrides. When set, these replace the shared tools for that
    # step on the Proposal (maps to spec.{analysis,execution,verification}.tools).
    # analysis:
    #   tools:
    #     skills:
    #       - image: registry.redhat.io/openshift-lightspeed/analysis-skills:latest
    #         paths:
    #           - /skills/diagnostic
    # execution:
    #   tools:
    #     skills:
    #       - image: registry.redhat.io/openshift-lightspeed/exec-skills:latest
    #         paths:
    #           - /skills/remediation
    # verification:
    #   tools:
    #     skills:
    #       - image: registry.redhat.io/openshift-lightspeed/verify-skills:latest
    #         paths:
    #           - /skills/validation
