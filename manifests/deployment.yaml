apiVersion: apps/v1
kind: Deployment
metadata:
  name: lightspeed-agentic-alerts-adapter
  namespace: openshift-lightspeed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lightspeed-agentic-alerts-adapter
  template:
    metadata:
      labels:
        app: lightspeed-agentic-alerts-adapter
    spec:
      serviceAccountName: lightspeed-agentic-alerts-adapter
      securityContext:
        runAsNonRoot: true
      containers:
        - name: adapter
          image: quay.io/openshiftanalytics/lightspeed-agentic-alerts-adapter:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: ALERTMANAGER_URL
              value: https://alertmanager-main.openshift-monitoring.svc:9094
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
